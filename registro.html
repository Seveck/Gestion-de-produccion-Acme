<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME - Registro</title>
    <link rel="stylesheet" href="css/registro.css">
    <script src="js/registro.js" defer></script>
</head>
<body>
    <main class="login-card">
        <h1 class="tituloSesion">Registrarse</h1>
        
        <form class="login-form">
            <div class="input">
                <label class="label-text">Nombre completo</label>
                <input type="text" name="nombre" placeholder="Ingresa tu nombre" class="input-space" autofocus required>
            </div>
            
            <div class="input">
                <label class="label-text">Número de identificación</label>
                <input type="number" name="username" placeholder="Ingresa tu número" class="input-space" required>
            </div>

            <div class="input">
                <label class="label-text">Rol / Cargo</label>
                <select name="rol" id="cargo" class="select-space" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="administrador">Administrador</option>
                    <option value="cliente">Cliente</option>
                </select>
            </div>

            <div class="input">
                <label class="label-text">Contraseña</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" class="input-password" id="password" required>
            </div>
            
            <div class="input">
                <label class="label-text">Confirma contraseña</label>
                <input type="password" name="passwordConfirm" placeholder="Confirma tu contraseña" class="input-passwordConfirm" id="passwordConfirm" required>
            </div>

            <p id="error"></p>

            <button type="submit" class="btn-login" id="btn-login">Register</button>

            <h6>¿Ya tienes cuenta? <a href="index.html">Oprime aquí</a></h6>
        </form>
    </main>
</body>
</html>
